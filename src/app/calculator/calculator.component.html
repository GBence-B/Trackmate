<div class="calculator">
  <h3>Main Calculator</h3>
  <select [(ngModel)]="selectedCurrency" (change)="updateDisplay()" title="Select currency">
    <option value="USD">USD ($)</option>
    <option value="EUR">EUR (€)</option>
    <option value="HUF">HUF (Ft)</option>
  </select>
  <input type="text" [value]="display" readonly (keydown)="onKeyPress($event)" placeholder="Type expression (e.g., 1+2)..." autofocus>
  <div class="answer-bubble" *ngIf="rawValue !== null" [@fadeInOut]>{{ formattedDisplay }}</div>
  <div class="buttons">
    <button (click)="append('1')" [@buttonHover] title="1">1</button>
    <button (click)="append('2')" [@buttonHover] title="2">2</button>
    <button (click)="append('3')" [@buttonHover] title="3">3</button>
    <button (click)="append('+')" [@buttonHover] title="Add">+</button>
    <button (click)="append('4')" [@buttonHover] title="4">4</button>
    <button (click)="append('5')" [@buttonHover] title="5">5</button>
    <button (click)="append('6')" [@buttonHover] title="6">6</button>
    <button (click)="append('-')" [@buttonHover] title="Subtract">-</button>
    <button (click)="append('7')" [@buttonHover] title="7">7</button>
    <button (click)="append('8')" [@buttonHover] title="8">8</button>
    <button (click)="append('9')" [@buttonHover] title="9">9</button>
    <button (click)="append('*')" [@buttonHover] title="Multiply">*</button>
    <button (click)="append('0')" [@buttonHover] title="0">0</button>
    <button (click)="clear()" [@buttonHover] title="Clear (Ctrl+C)">C</button>
    <button (click)="calculate()" [@buttonHover] title="Calculate (=)">=</button>
    <button (click)="append('/')" [@buttonHover] title="Divide">/</button>
  </div>

  <button class="toggle-expenses" (click)="toggleExpenses()" [@buttonHover]>{{ expensesVisible ? 'Hide' : 'Show' }} Expenses</button>
  <div class="expense-section" *ngIf="expensesVisible" [@slideInOut]>
    <div class="category" *ngFor="let category of expenseCategories">
      <h4>{{ category.name }}</h4>
      <input type="number" [(ngModel)]="category.newAmount" placeholder="Enter amount..." step="0.01" title="Add amount to {{ category.name }}">
      <button (click)="addExpense(category)" [@buttonHover] title="Add to {{ category.name }}">+</button>
      <ul *ngIf="category.items.length > 0">
        <li *ngFor="let item of category.items; let i = index" [@fadeInOut]>
          {{ formattedCurrency(item) }} <button (click)="removeExpense(category, i)" title="Remove">×</button>
        </li>
      </ul>
      <p>Subtotal: {{ formattedCurrency(category.subtotal) }}</p>
    </div>
    <div class="total">
      <h4>Grand Total: {{ formattedCurrency(grandTotal) }}</h4>
      <button (click)="clearAllExpenses()" [@buttonHover] title="Clear all expenses" (click)="confirmClear()">Clear All</button>
    </div>
  </div>
</div>
