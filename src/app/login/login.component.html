<div class="login-container">
  <h1>Welcome to Calendar Calculator</h1>
  <div class="form-section">
    <h2>Register / Login</h2>
    <form (ngSubmit)="onSubmit()">
      <input type="text" [(ngModel)]="username" placeholder="Username" required>
      <input type="password" [(ngModel)]="password" placeholder="Password" required>
      <button type="submit">{{ isRegistering ? 'Register' : 'Login' }}</button>
    </form>
    <button (click)="toggleMode()">{{ isRegistering ? 'Already have an account? Login' : 'Need to register?' }}</button>
    <p *ngIf="errorMessage" class="error">{{ errorMessage }}</p>
  </div>
  <div class="guest-section">
    <button (click)="useAsGuest()">Use as Guest</button>
  </div>
</div>
