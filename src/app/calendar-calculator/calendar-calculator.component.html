<div class="app-container">
  <div class="calendar-section">
    <h1>{{ currentMonth | date:'MMMM yyyy' }}</h1>
    <div class="nav-buttons">
      <button (click)="changeMonth(-1)">Prev</button>
      <button (click)="changeMonth(1)">Next</button>
      <button (click)="logout()">Logout</button>
    </div>
    <div class="calendar-grid">
      <div class="day-header">Sun</div>
      <div class="day-header">Mon</div>
      <div class="day-header">Tue</div>
      <div class="day-header">Wed</div>
      <div class="day-header">Thu</div>
      <div class="day-header">Fri</div>
      <div class="day-header">Sat</div>
      <div class="day-cell" *ngFor="let day of calendarDays; let i = index" [class.today]="day.isToday">
        <textarea [(ngModel)]="day.note" placeholder="Add note..." rows="2" cols="10"></textarea>
        <span>{{ day.date }}</span>
      </div>
    </div>
  </div>
  <div class="calculator-section">
    <app-calculator></app-calculator>
  </div>
</div>
